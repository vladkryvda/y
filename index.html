<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0e0e0e;
    color: #e8e8e8;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrap {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .lbl {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    margin-bottom: 7px;
  }
  .lbl.ok  { color: #5ecf6a; }
  .lbl.err { color: #e05555; }

  .inp-row { position: relative; }

  input {
    width: 100%;
    background: #141414;
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: 10px;
    padding: 13px 42px 13px 15px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #e8e8e8;
    outline: none;
    transition: border-color 0.2s;
  }
  input::placeholder { color: rgba(255,255,255,0.18); }
  input:focus  { border-color: rgba(255,255,255,0.3); }
  input.ok     { border-color: rgba(94,207,106,0.45); }
  input.err    { border-color: rgba(224,85,85,0.4); }

  #clr {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: rgba(255,255,255,0.22);
    font-size: 14px; cursor: pointer;
    display: none; line-height: 1;
  }
  #clr.on { display: block; }
  #clr:hover { color: #e8e8e8; }

  .player {
    width: 100%;
    aspect-ratio: 16/9;
    background: #111;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }

  .ph {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
    color: rgba(255,255,255,0.13);
    pointer-events: none;
  }
  .ph svg { width: 50px; height: 50px; }
  .ph p { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; }

  #frame {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none; display: none;
  }
  #frame.on { display: block; }

  .toast {
    position: fixed; bottom: 22px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #e8e8e8; color: #111;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; padding: 8px 16px;
    border-radius: 7px; opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">

  <div>
    <div class="lbl" id="lbl">YouTube URL</div>
    <div class="inp-row">
      <input id="inp" type="text"
        placeholder="вставте посилання на відео..."
        autocomplete="off" spellcheck="false">
      <button id="clr">&#10005;</button>
    </div>
  </div>

  <div class="player">
    <div class="ph" id="ph">
      <svg viewBox="0 0 50 50" fill="none">
        <rect x="1" y="7" width="48" height="36" rx="4" stroke="currentColor" stroke-width="1.4"/>
        <polygon points="20,16 37,25 20,34" fill="currentColor" opacity="0.55"/>
      </svg>
      <p>очікую посилання</p>
    </div>
    <iframe id="frame"
      allow="autoplay; encrypted-media; fullscreen"
      allowfullscreen></iframe>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
  var inp   = document.getElementById('inp');
  var lbl   = document.getElementById('lbl');
  var clr   = document.getElementById('clr');
  var ph    = document.getElementById('ph');
  var frame = document.getElementById('frame');
  var toast = document.getElementById('toast');
  var cur   = null;

  function getId(s) {
    s = (s || '').trim();
    var m;
    m = s.match(/[?&]v=([a-zA-Z0-9_-]{11})/);   if (m) return m[1];
    m = s.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if (m) return m[1];
    m = s.match(/\/shorts\/([a-zA-Z0-9_-]{11})/);  if (m) return m[1];
    return null;
  }

  function play(id) {
    if (id === cur) return;
    cur = id;
    if (!id) {
      frame.src = 'about:blank';
      frame.className = '';
      ph.style.display = '';
      return;
    }
    ph.style.display = 'none';
    frame.className = 'on';
    frame.src = 'https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0';
  }

  inp.addEventListener('input', function () {
    var v = inp.value;
    clr.className = v ? 'on' : '';

    if (!v.trim()) {
      inp.className = '';
      lbl.className = 'lbl';
      lbl.textContent = 'YouTube URL';
      play(null);
      return;
    }

    var id = getId(v);
    if (id) {
      inp.className = 'ok';
      lbl.className = 'lbl ok';
      lbl.textContent = 'відео знайдено ✓';
      play(id);
    } else {
      inp.className = 'err';
      lbl.className = 'lbl err';
      lbl.textContent = 'некоректне посилання';
      play(null);
    }
  });

  clr.addEventListener('click', function () {
    inp.value = '';
    inp.className = '';
    lbl.className = 'lbl';
    lbl.textContent = 'YouTube URL';
    clr.className = '';
    play(null);
    inp.focus();
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.className = 'toast on';
    setTimeout(function () { toast.className = 'toast'; }, 2000);
  }
</script>
</body>
</html>
